server:
  port: 8080

spring:
  application:
    name: family-league
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/family_league}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: false
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

app:
  jwt:
    secret: ${JWT_SECRET:familyLeagueSecretKey2024_ChangeInProduction_MustBe256BitsLong!!}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  prediction:
    league-lock-hours-before-first-match: ${LEAGUE_LOCK_HOURS:4}
    match-lock-hours-before-start: ${MATCH_LOCK_HOURS:1}
  notification:
    from-email: ${NOTIFICATION_FROM_EMAIL:no-reply@familyleague.com}
    reminder-before-lock-minutes: ${REMINDER_BEFORE_LOCK_MINUTES:60}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    try-it-out-enabled: true
    operations-sorter: alpha
    tags-sorter: alpha

logging:
  level:
    root: INFO
    com.familyleague: DEBUG
  file:
    name: logs/family-league.log
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
